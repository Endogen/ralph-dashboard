services:
  ralph-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8420:8420"
    volumes:
      - ./data:/data
    environment:
      RALPH_CREDENTIALS_FILE: /data/credentials.yaml
      RALPH_DB_DIR: /data
      RALPH_PROJECT_DIRS: /projects
      RALPH_JWT_SECRET: ${RALPH_JWT_SECRET:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
